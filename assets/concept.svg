<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="marma-concept-title marma-concept-desc">
    <title id="marma-concept-title">Marma multi-layer peptide-coated suture — signature concept</title>
    <desc id="marma-concept-desc">Cross-sectional architecture of Marma's bioactive suture, showing the absorbable polymer core surrounded by four concentric peptide-functionalized layers, accompanied by a temporal release profile across the phases of wound healing.</desc>

    <defs>
        <!-- Core filament gradient (absorbable polymer) -->
        <radialGradient id="core-grad" cx="40%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#9aa8c0"/>
            <stop offset="100%" stop-color="#5a6478"/>
        </radialGradient>

        <!-- Layer gradients — each phase has its own color identity -->
        <radialGradient id="layer-1" cx="50%" cy="50%" r="50%">
            <!-- Phase I: Hemostasis -->
            <stop offset="0%" stop-color="#ff8a8a" stop-opacity="0"/>
            <stop offset="55%" stop-color="#ff6b8a" stop-opacity="0.45"/>
            <stop offset="100%" stop-color="#d04a78" stop-opacity="0.7"/>
        </radialGradient>

        <radialGradient id="layer-2" cx="50%" cy="50%" r="50%">
            <!-- Phase II: Sealing hydrogel -->
            <stop offset="0%" stop-color="#5ae0d0" stop-opacity="0"/>
            <stop offset="55%" stop-color="#4ac8c0" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#2a9090" stop-opacity="0.65"/>
        </radialGradient>

        <radialGradient id="layer-3" cx="50%" cy="50%" r="50%">
            <!-- Phase III: Anti-fibrotic -->
            <stop offset="0%" stop-color="#80f0c8" stop-opacity="0"/>
            <stop offset="55%" stop-color="#6ad6a8" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#3a9070" stop-opacity="0.6"/>
        </radialGradient>

        <radialGradient id="layer-4" cx="50%" cy="50%" r="50%">
            <!-- Phase IV: Anti-adhesion outer -->
            <stop offset="0%" stop-color="#ffb888" stop-opacity="0"/>
            <stop offset="55%" stop-color="#f59868" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#c06840" stop-opacity="0.55"/>
        </radialGradient>

        <!-- Soft glow filter -->
        <filter id="soft-glow-c" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="2.5"/>
        </filter>

        <!-- Outer glow -->
        <radialGradient id="outer-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="rgba(180, 220, 255, 0.15)"/>
            <stop offset="100%" stop-color="rgba(180, 220, 255, 0)"/>
        </radialGradient>
    </defs>

    <!-- ============================================================
         BACKGROUND PANEL (subtle)
         ============================================================ -->
    <rect width="720" height="520" fill="#0a1020" opacity="0"/>

    <!-- ============================================================
         LEFT SIDE: CROSS-SECTIONAL ARCHITECTURE
         ============================================================ -->
    <g id="cross-section">
        <!-- Outer glow halo -->
        <circle cx="200" cy="220" r="160" fill="url(#outer-glow)"/>

        <!-- Layer 4: Outermost — Anti-adhesion -->
        <circle cx="200" cy="220" r="135" fill="url(#layer-4)" opacity="0.85"/>
        <circle cx="200" cy="220" r="135" fill="none"
                stroke="rgba(245, 152, 104, 0.6)" stroke-width="1"/>

        <!-- Layer 3: Anti-fibrotic -->
        <circle cx="200" cy="220" r="108" fill="url(#layer-3)" opacity="0.9"/>
        <circle cx="200" cy="220" r="108" fill="none"
                stroke="rgba(106, 214, 168, 0.6)" stroke-width="1"/>

        <!-- Layer 2: Sealing hydrogel -->
        <circle cx="200" cy="220" r="82" fill="url(#layer-2)" opacity="0.92"/>
        <circle cx="200" cy="220" r="82" fill="none"
                stroke="rgba(74, 200, 192, 0.6)" stroke-width="1"/>

        <!-- Layer 1: Hemostasis -->
        <circle cx="200" cy="220" r="58" fill="url(#layer-1)" opacity="0.94"/>
        <circle cx="200" cy="220" r="58" fill="none"
                stroke="rgba(255, 107, 138, 0.6)" stroke-width="1"/>

        <!-- Core filament -->
        <circle cx="200" cy="220" r="35" fill="url(#core-grad)"/>
        <circle cx="200" cy="220" r="35" fill="none"
                stroke="rgba(180, 200, 230, 0.7)" stroke-width="1.2"/>
        <text x="200" y="218" text-anchor="middle"
              font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="10" fill="#e0e8f5" font-weight="500" letter-spacing="0.05em">CORE</text>
        <text x="200" y="232" text-anchor="middle"
              font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="8" fill="#b8c4d8">absorbable</text>

        <!-- Concentric layer pulse animation (subtle outward release) -->
        <g opacity="0.5">
            <circle cx="200" cy="220" r="58" fill="none"
                    stroke="rgba(255, 107, 138, 0.6)" stroke-width="1">
                <animate attributeName="r" values="58;80;58" dur="3s"
                         repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.6;0;0.6" dur="3s"
                         repeatCount="indefinite"/>
            </circle>
            <circle cx="200" cy="220" r="82" fill="none"
                    stroke="rgba(74, 200, 192, 0.5)" stroke-width="1">
                <animate attributeName="r" values="82;105;82" dur="3.5s"
                         begin="0.6s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.5;0;0.5" dur="3.5s"
                         begin="0.6s" repeatCount="indefinite"/>
            </circle>
            <circle cx="200" cy="220" r="108" fill="none"
                    stroke="rgba(106, 214, 168, 0.5)" stroke-width="1">
                <animate attributeName="r" values="108;132;108" dur="4s"
                         begin="1.2s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.5;0;0.5" dur="4s"
                         begin="1.2s" repeatCount="indefinite"/>
            </circle>
            <circle cx="200" cy="220" r="135" fill="none"
                    stroke="rgba(245, 152, 104, 0.5)" stroke-width="1">
                <animate attributeName="r" values="135;160;135" dur="4.5s"
                         begin="1.8s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.5;0;0.5" dur="4.5s"
                         begin="1.8s" repeatCount="indefinite"/>
            </circle>
        </g>

        <!-- Leader lines and labels for each layer -->
        <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
           font-size="10" letter-spacing="0.04em">

            <!-- Layer 1 label (Hemostasis) -->
            <line x1="245" y1="195" x2="305" y2="160"
                  stroke="rgba(255, 107, 138, 0.7)" stroke-width="1"/>
            <circle cx="305" cy="160" r="2.5" fill="#ff6b8a"/>
            <text x="312" y="156" fill="#ffb0c0" font-weight="500">Layer 1 · Hemostasis</text>
            <text x="312" y="170" fill="#98a8c0" font-size="8.5">Early phase</text>

            <!-- Layer 2 label (Sealing) -->
            <line x1="265" y1="170" x2="335" y2="115"
                  stroke="rgba(74, 200, 192, 0.7)" stroke-width="1"/>
            <circle cx="335" cy="115" r="2.5" fill="#4ac8c0"/>
            <text x="342" y="111" fill="#90dcd5" font-weight="500">Layer 2 · Sealing</text>
            <text x="342" y="125" fill="#98a8c0" font-size="8.5">Early phase</text>

            <!-- Layer 3 label (Anti-fibrotic) -->
            <line x1="285" y1="225" x2="335" y2="225"
                  stroke="rgba(106, 214, 168, 0.7)" stroke-width="1"/>
            <circle cx="335" cy="225" r="2.5" fill="#6ad6a8"/>
            <text x="342" y="221" fill="#a0e0c0" font-weight="500">Layer 3 · Anti-fibrotic</text>
            <text x="342" y="235" fill="#98a8c0" font-size="8.5">Late phase</text>

            <!-- Layer 4 label (Anti-adhesion) -->
            <line x1="295" y1="280" x2="335" y2="320"
                  stroke="rgba(245, 152, 104, 0.7)" stroke-width="1"/>
            <circle cx="335" cy="320" r="2.5" fill="#f59868"/>
            <text x="342" y="316" fill="#f5c0a0" font-weight="500">Layer 4 · Anti-adhesion</text>
            <text x="342" y="330" fill="#98a8c0" font-size="8.5">Intermediate phase</text>

            <!-- Core label -->
            <line x1="155" y1="220" x2="95" y2="220"
                  stroke="rgba(180, 200, 230, 0.6)" stroke-width="1"/>
            <circle cx="95" cy="220" r="2.5" fill="#9aa8c0"/>
            <text x="88" y="216" fill="#c8d4e8" font-weight="500" text-anchor="end">Core filament</text>
            <text x="88" y="230" fill="#98a8c0" font-size="8.5" text-anchor="end">absorbable polymer</text>

        </g>

        <!-- Cross-section title -->
        <text x="200" y="395" text-anchor="middle"
              font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="11" font-weight="500" fill="#b8d4f0" letter-spacing="0.1em">
            CROSS-SECTIONAL ARCHITECTURE
        </text>

        <!-- Scale bar -->
        <g stroke="#a0b0c8" stroke-width="1" fill="none">
            <line x1="115" y1="420" x2="195" y2="420"/>
            <line x1="115" y1="416" x2="115" y2="424"/>
            <line x1="195" y1="416" x2="195" y2="424"/>
        </g>
        <text x="155" y="412" text-anchor="middle" fill="#a0b0c8"
              font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="9" letter-spacing="0.05em">
            schematic, not to scale
        </text>
    </g>

    <!-- ============================================================
         RIGHT SIDE: TEMPORAL RELEASE PROFILE
         ============================================================ -->
    <g id="temporal-profile">
        <!-- Section title -->
        <text x="540" y="55" text-anchor="middle"
              font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="11" font-weight="500" fill="#b8d4f0" letter-spacing="0.1em">
            TEMPORAL RELEASE PROFILE
        </text>

        <!-- Plot area -->
        <g transform="translate(420, 90)">
            <!-- Axes -->
            <line x1="20" y1="220" x2="240" y2="220"
                  stroke="rgba(160, 180, 210, 0.5)" stroke-width="1"/>
            <line x1="20" y1="20" x2="20" y2="220"
                  stroke="rgba(160, 180, 210, 0.5)" stroke-width="1"/>

            <!-- Y-axis label -->
            <text x="-115" y="125" transform="rotate(-90 -115 125)" text-anchor="middle"
                  font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
                  font-size="9" fill="#98a8c0" letter-spacing="0.04em">
                BIOACTIVE RELEASE INTENSITY
            </text>

            <!-- X-axis tick marks and labels -->
            <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
               font-size="8" fill="#98a8c0">
                <line x1="20" y1="220" x2="20" y2="225"
                      stroke="rgba(160, 180, 210, 0.5)"/>
                <text x="20" y="238" text-anchor="middle">0</text>

                <line x1="65" y1="220" x2="65" y2="225"
                      stroke="rgba(160, 180, 210, 0.5)"/>
                <text x="65" y="238" text-anchor="middle">minutes</text>

                <line x1="125" y1="220" x2="125" y2="225"
                      stroke="rgba(160, 180, 210, 0.5)"/>
                <text x="125" y="238" text-anchor="middle">hours</text>

                <line x1="185" y1="220" x2="185" y2="225"
                      stroke="rgba(160, 180, 210, 0.5)"/>
                <text x="185" y="238" text-anchor="middle">days</text>

                <line x1="240" y1="220" x2="240" y2="225"
                      stroke="rgba(160, 180, 210, 0.5)"/>
                <text x="240" y="238" text-anchor="middle">weeks</text>
            </g>
            <text x="130" y="252" text-anchor="middle"
                  font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
                  font-size="9" fill="#98a8c0" letter-spacing="0.04em">
                TIME (LOG SCALE)
            </text>

            <!-- Phase 1: Hemostasis curve — sharp early peak -->
            <path d="M 20 220 Q 30 30 50 50 Q 70 100 90 180 L 110 215 L 240 219"
                  fill="rgba(255, 107, 138, 0.18)" stroke="#ff6b8a" stroke-width="1.6"/>

            <!-- Phase 2: Sealing curve — peak at minutes -->
            <path d="M 20 220 Q 35 215 50 80 Q 70 60 95 100 Q 120 180 145 215 L 240 219"
                  fill="rgba(74, 200, 192, 0.18)" stroke="#4ac8c0" stroke-width="1.6"/>

            <!-- Phase 3: Anti-fibrotic curve — sustained mid release -->
            <path d="M 20 220 L 70 210 Q 90 180 120 100 Q 150 70 180 110 Q 210 170 240 215"
                  fill="rgba(106, 214, 168, 0.18)" stroke="#6ad6a8" stroke-width="1.6"/>

            <!-- Phase 4: Anti-adhesion curve — sustained late release -->
            <path d="M 20 220 L 90 215 Q 120 200 150 130 Q 180 80 210 90 Q 230 100 240 130"
                  fill="rgba(245, 152, 104, 0.18)" stroke="#f59868" stroke-width="1.6"/>

            <!-- Peak markers -->
            <circle cx="35" cy="40" r="3" fill="#ff6b8a"/>
            <circle cx="60" cy="68" r="3" fill="#4ac8c0"/>
            <circle cx="135" cy="80" r="3" fill="#6ad6a8"/>
            <circle cx="195" cy="85" r="3" fill="#f59868"/>

            <!-- Inline mini legend -->
            <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
               font-size="8.5" letter-spacing="0.04em">
                <circle cx="55" cy="10" r="3" fill="#ff6b8a"/>
                <text x="62" y="13" fill="#ffb0c0">Hemostasis</text>

                <circle cx="125" cy="10" r="3" fill="#4ac8c0"/>
                <text x="132" y="13" fill="#90dcd5">Sealing</text>

                <circle cx="195" cy="10" r="3" fill="#6ad6a8"/>
                <text x="202" y="13" fill="#a0e0c0">Anti-fibrotic</text>
            </g>
        </g>
    </g>

    <!-- ============================================================
         BOTTOM CAPTION
         ============================================================ -->
    <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
        <text x="360" y="475" text-anchor="middle"
              font-size="11" font-weight="500" fill="#d8e6f5" letter-spacing="0.06em">
            MARMA · MULTI-LAYER PEPTIDE-COATED SUTURE
        </text>
        <text x="360" y="495" text-anchor="middle"
              font-size="9" fill="#98a8c0" letter-spacing="0.03em">
            One material · four functions · time-structured release across the wound healing cascade
        </text>
    </g>

</svg>
