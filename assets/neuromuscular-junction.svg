<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-labelledby="nmj-title nmj-desc">
    <title id="nmj-title">Neuromuscular junction</title>
    <desc id="nmj-desc">A textbook-style diagram of the neuromuscular junction. A myelinated motor axon terminates in an axon terminal containing synaptic vesicles. The vesicles release neurotransmitter into the synaptic cleft, where it binds receptors on the sarcolemma of the muscle fiber, with junctional folds visible.</desc>

    <defs>
        <!-- Myelin sheath (Schwann cell wrapping) -->
        <linearGradient id="myelin-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#b8d8e8"/>
            <stop offset="50%" stop-color="#88b0c8"/>
            <stop offset="100%" stop-color="#5a7a92"/>
        </linearGradient>

        <!-- Axon (within myelin) -->
        <linearGradient id="axon-inner" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#7eb8da"/>
            <stop offset="100%" stop-color="#4a7298"/>
        </linearGradient>

        <!-- Axon terminal (synaptic bouton) -->
        <radialGradient id="terminal-grad" cx="50%" cy="40%" r="55%">
            <stop offset="0%" stop-color="#f8d878"/>
            <stop offset="60%" stop-color="#d8a838"/>
            <stop offset="100%" stop-color="#8a6a20"/>
        </radialGradient>

        <!-- Muscle fiber -->
        <linearGradient id="muscle-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#e8a098"/>
            <stop offset="50%" stop-color="#cc7068"/>
            <stop offset="100%" stop-color="#a04848"/>
        </linearGradient>

        <!-- Sarcolemma (muscle cell membrane) -->
        <linearGradient id="sarco-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#a070a8"/>
            <stop offset="100%" stop-color="#684878"/>
        </linearGradient>

        <!-- Synaptic vesicle -->
        <radialGradient id="vesicle-grad" cx="35%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#d4f0a8"/>
            <stop offset="100%" stop-color="#80a050"/>
        </radialGradient>

        <filter id="nmj-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1.5"/>
        </filter>
    </defs>

    <!-- Dark microscope-field background -->
    <rect width="720" height="480" fill="#0a1224"/>
    <radialGradient id="nmj-vignette" cx="50%" cy="50%" r="65%">
        <stop offset="0%" stop-color="rgba(50, 30, 30, 0.4)"/>
        <stop offset="100%" stop-color="rgba(8, 12, 25, 0.95)"/>
    </radialGradient>
    <rect width="720" height="480" fill="url(#nmj-vignette)"/>

    <!-- ============================================================
         INCOMING MYELINATED AXON (top)
         Drawn as in the textbook: an axon segment with myelin
         wrapping, branching as it approaches the muscle fiber.
         ============================================================ -->
    <g id="myelinated-axon">
        <!-- Myelin sheath -->
        <path d="M 320 30 L 360 30 L 365 90 L 315 90 Z"
              fill="url(#myelin-grad)" stroke="#3a5060" stroke-width="0.8"/>
        <!-- Inner axon visible at top and bottom -->
        <rect x="333" y="24" width="14" height="8" fill="url(#axon-inner)"
              stroke="#2a4060" stroke-width="0.5"/>
        <rect x="328" y="86" width="24" height="10" fill="url(#axon-inner)"
              stroke="#2a4060" stroke-width="0.5"/>

        <!-- Action potential traveling down the axon -->
        <circle cx="340" cy="60" r="4" fill="#ff8888" filter="url(#nmj-glow)"
                opacity="0.9"/>
        <path d="M 340 60 L 340 75" stroke="#ffaaaa" stroke-width="2"
              stroke-linecap="round" opacity="0.7"/>

        <!-- Terminal branches splitting from the main axon -->
        <path d="M 340 95 Q 320 110 290 130 L 280 145"
              stroke="#5a7a92" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M 340 95 Q 360 110 390 130 L 400 145"
              stroke="#5a7a92" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M 340 95 L 340 145"
              stroke="#5a7a92" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    </g>

    <!-- ============================================================
         AXON TERMINAL (the synaptic bouton — the cup-shaped
         expansion at the end of the axon)
         ============================================================ -->
    <g id="axon-terminal">
        <!-- Cup-shaped terminal -->
        <path d="M 200 145 Q 185 165 195 220 Q 220 280 360 280 Q 500 280 525 220 Q 535 165 520 145 Z"
              fill="url(#terminal-grad)" stroke="#6a4818" stroke-width="1.5"/>

        <!-- Inner highlight -->
        <path d="M 220 150 Q 210 165 215 200 Q 235 230 360 235 Q 485 230 505 200 Q 510 165 500 150 Z"
              fill="rgba(255, 230, 150, 0.3)" stroke="none"/>

        <!-- Synaptic vesicles inside the terminal — small green-tinted
             spheres clustered near the bottom (release zone) -->
        <g id="vesicles">
            <!-- Cluster near the release zone -->
            <circle cx="245" cy="245" r="5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>
            <circle cx="265" cy="255" r="5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>
            <circle cx="288" cy="248" r="5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>
            <circle cx="310" cy="258" r="5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>
            <circle cx="335" cy="252" r="5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>
            <circle cx="360" cy="262" r="5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>
            <circle cx="385" cy="252" r="5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>
            <circle cx="410" cy="258" r="5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>
            <circle cx="432" cy="248" r="5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>
            <circle cx="455" cy="255" r="5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>
            <circle cx="475" cy="245" r="5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>

            <!-- Vesicles reserve pool (higher up) -->
            <circle cx="270" cy="215" r="4.5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>
            <circle cx="295" cy="220" r="4.5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>
            <circle cx="320" cy="215" r="4.5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>
            <circle cx="345" cy="220" r="4.5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>
            <circle cx="375" cy="215" r="4.5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>
            <circle cx="400" cy="220" r="4.5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>
            <circle cx="425" cy="215" r="4.5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>
            <circle cx="450" cy="220" r="4.5" fill="url(#vesicle-grad)" stroke="#506a30" stroke-width="0.4"/>

            <!-- Mitochondrion (rod-shaped, characteristic textbook depiction) -->
            <ellipse cx="320" cy="180" rx="22" ry="6"
                     fill="#c84848" stroke="#7a2828" stroke-width="0.6"/>
            <line x1="305" y1="180" x2="335" y2="180" stroke="#7a2828" stroke-width="0.4"/>
            <line x1="310" y1="177" x2="330" y2="177" stroke="#7a2828" stroke-width="0.4"/>
            <line x1="310" y1="183" x2="330" y2="183" stroke="#7a2828" stroke-width="0.4"/>

            <ellipse cx="400" cy="180" rx="20" ry="6"
                     fill="#c84848" stroke="#7a2828" stroke-width="0.6"/>
            <line x1="385" y1="180" x2="415" y2="180" stroke="#7a2828" stroke-width="0.4"/>
            <line x1="390" y1="177" x2="410" y2="177" stroke="#7a2828" stroke-width="0.4"/>
            <line x1="390" y1="183" x2="410" y2="183" stroke="#7a2828" stroke-width="0.4"/>
        </g>

        <!-- Active zones: vesicles fusing with membrane -->
        <g id="fusing-vesicles">
            <path d="M 285 280 Q 290 270 295 280" fill="rgba(212, 240, 168, 0.7)"
                  stroke="#506a30" stroke-width="0.5"/>
            <path d="M 365 280 Q 370 270 375 280" fill="rgba(212, 240, 168, 0.7)"
                  stroke="#506a30" stroke-width="0.5"/>
            <path d="M 425 280 Q 430 270 435 280" fill="rgba(212, 240, 168, 0.7)"
                  stroke="#506a30" stroke-width="0.5"/>
        </g>
    </g>

    <!-- ============================================================
         SYNAPTIC CLEFT (the gap)
         Neurotransmitter molecules diffusing across
         ============================================================ -->
    <g id="cleft">
        <!-- Cleft area (subtle shading) -->
        <rect x="200" y="285" width="325" height="20" fill="rgba(60, 30, 60, 0.4)"/>

        <!-- Neurotransmitter molecules in the cleft -->
        <g fill="rgba(160, 220, 120, 0.9)" filter="url(#nmj-glow)">
            <circle cx="240" cy="293" r="2.2"/>
            <circle cx="260" cy="298" r="2.2"/>
            <circle cx="285" cy="295" r="2.2"/>
            <circle cx="305" cy="300" r="2.2"/>
            <circle cx="330" cy="295" r="2.2"/>
            <circle cx="355" cy="298" r="2.2"/>
            <circle cx="380" cy="293" r="2.2"/>
            <circle cx="405" cy="300" r="2.2"/>
            <circle cx="430" cy="295" r="2.2"/>
            <circle cx="455" cy="298" r="2.2"/>
            <circle cx="480" cy="293" r="2.2"/>
            <circle cx="500" cy="298" r="2.2"/>
        </g>
    </g>

    <!-- ============================================================
         SARCOLEMMA with JUNCTIONAL FOLDS
         The post-synaptic membrane shows the characteristic
         folded structure that increases receptor surface area
         ============================================================ -->
    <g id="sarcolemma">
        <!-- Junctional folds (the wavy membrane surface) -->
        <path d="M 195 305
                 Q 200 322 210 305 L 220 305
                 Q 225 322 235 305 L 245 305
                 Q 250 322 260 305 L 270 305
                 Q 275 322 285 305 L 295 305
                 Q 300 322 310 305 L 320 305
                 Q 325 322 335 305 L 345 305
                 Q 350 322 360 305 L 370 305
                 Q 375 322 385 305 L 395 305
                 Q 400 322 410 305 L 420 305
                 Q 425 322 435 305 L 445 305
                 Q 450 322 460 305 L 470 305
                 Q 475 322 485 305 L 495 305
                 Q 500 322 510 305 L 525 305
                 L 525 340 L 195 340 Z"
              fill="url(#sarco-grad)" stroke="#3a2848" stroke-width="0.8"/>

        <!-- ACh receptors at the top of each fold -->
        <g fill="#3a4878" stroke="#1a2848" stroke-width="0.5">
            <rect x="206" y="308" width="8" height="10" rx="1.5"/>
            <rect x="231" y="308" width="8" height="10" rx="1.5"/>
            <rect x="256" y="308" width="8" height="10" rx="1.5"/>
            <rect x="281" y="308" width="8" height="10" rx="1.5"/>
            <rect x="306" y="308" width="8" height="10" rx="1.5"/>
            <rect x="331" y="308" width="8" height="10" rx="1.5"/>
            <rect x="356" y="308" width="8" height="10" rx="1.5"/>
            <rect x="381" y="308" width="8" height="10" rx="1.5"/>
            <rect x="406" y="308" width="8" height="10" rx="1.5"/>
            <rect x="431" y="308" width="8" height="10" rx="1.5"/>
            <rect x="456" y="308" width="8" height="10" rx="1.5"/>
            <rect x="481" y="308" width="8" height="10" rx="1.5"/>
            <rect x="506" y="308" width="8" height="10" rx="1.5"/>
        </g>
    </g>

    <!-- ============================================================
         MUSCLE FIBER (sarcoplasm, with characteristic striations)
         ============================================================ -->
    <g id="muscle-fiber">
        <!-- Body of the muscle fiber -->
        <path d="M 80 340 L 640 340 L 640 430 L 80 430 Z"
              fill="url(#muscle-grad)" stroke="#702828" stroke-width="1"/>

        <!-- Striations (myofibril pattern) -->
        <g stroke="#5a2020" stroke-width="0.5" opacity="0.5">
            <line x1="80" y1="355" x2="640" y2="355"/>
            <line x1="80" y1="365" x2="640" y2="365"/>
            <line x1="80" y1="375" x2="640" y2="375"/>
            <line x1="80" y1="385" x2="640" y2="385"/>
            <line x1="80" y1="395" x2="640" y2="395"/>
            <line x1="80" y1="405" x2="640" y2="405"/>
            <line x1="80" y1="415" x2="640" y2="415"/>
            <line x1="80" y1="425" x2="640" y2="425"/>
        </g>

        <!-- Muscle nucleus (oval, characteristic) -->
        <ellipse cx="150" cy="385" rx="22" ry="7" fill="#5a4060" stroke="#3a2040" stroke-width="0.6"/>
        <ellipse cx="150" cy="385" rx="14" ry="3" fill="#3a2848"/>
    </g>

    <!-- ============================================================
         LABELS (textbook leader-line style)
         ============================================================ -->
    <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
       font-size="11" font-weight="500">

        <!-- Action potential -->
        <line x1="340" y1="60" x2="585" y2="60" stroke="#b8d4f0" stroke-width="0.8"/>
        <circle cx="340" cy="60" r="2" fill="#b8d4f0"/>
        <text x="590" y="58" fill="#d8e6f5">Action potential</text>
        <text x="590" y="71" fill="#98a8c0" font-size="9">arriving at terminal</text>

        <!-- Myelinated axon -->
        <line x1="340" y1="60" x2="585" y2="60" stroke="none"/>
        <line x1="345" y1="40" x2="585" y2="20" stroke="#b8d4f0" stroke-width="0.8"/>
        <circle cx="345" cy="40" r="2" fill="#b8d4f0"/>
        <text x="590" y="18" fill="#d8e6f5">Myelinated motor axon</text>

        <!-- Axon terminal -->
        <line x1="500" y1="170" x2="585" y2="120" stroke="#b8d4f0" stroke-width="0.8"/>
        <circle cx="500" cy="170" r="2" fill="#b8d4f0"/>
        <text x="590" y="118" fill="#d8e6f5">Axon terminal</text>
        <text x="590" y="131" fill="#98a8c0" font-size="9">(synaptic bouton)</text>

        <!-- Synaptic vesicles -->
        <line x1="450" y1="220" x2="585" y2="170" stroke="#b8d4f0" stroke-width="0.8"/>
        <circle cx="450" cy="220" r="2" fill="#b8d4f0"/>
        <text x="590" y="168" fill="#d8e6f5">Synaptic vesicles</text>
        <text x="590" y="181" fill="#98a8c0" font-size="9">(carrying ACh)</text>

        <!-- Mitochondrion -->
        <line x1="400" y1="180" x2="585" y2="220" stroke="#b8d4f0" stroke-width="0.8"/>
        <circle cx="400" cy="180" r="2" fill="#b8d4f0"/>
        <text x="590" y="218" fill="#d8e6f5">Mitochondrion</text>

        <!-- Synaptic cleft -->
        <line x1="500" y1="295" x2="585" y2="270" stroke="#b8d4f0" stroke-width="0.8"/>
        <circle cx="500" cy="295" r="2" fill="#b8d4f0"/>
        <text x="590" y="268" fill="#d8e6f5">Synaptic cleft</text>
        <text x="590" y="281" fill="#98a8c0" font-size="9">(neurotransmitter gap)</text>

        <!-- ACh receptors -->
        <line x1="510" y1="312" x2="585" y2="320" stroke="#b8d4f0" stroke-width="0.8"/>
        <circle cx="510" cy="312" r="2" fill="#b8d4f0"/>
        <text x="590" y="318" fill="#d8e6f5">ACh receptors</text>

        <!-- Junctional folds -->
        <line x1="475" y1="316" x2="585" y2="370" stroke="#b8d4f0" stroke-width="0.8"/>
        <circle cx="475" cy="316" r="2" fill="#b8d4f0"/>
        <text x="590" y="368" fill="#d8e6f5">Junctional folds</text>
        <text x="590" y="381" fill="#98a8c0" font-size="9">of sarcolemma</text>

        <!-- Muscle fiber -->
        <line x1="220" y1="385" x2="100" y2="445" stroke="#b8d4f0" stroke-width="0.8"/>
        <circle cx="220" cy="385" r="2" fill="#b8d4f0"/>
        <text x="100" y="463" fill="#d8e6f5" text-anchor="start">Muscle fiber</text>

        <!-- Step labels in the cleft itself -->
        <text x="60" y="430" fill="#a8b8d0" font-size="9" font-style="italic">
            Pre-synaptic → release
        </text>
        <text x="660" y="430" fill="#a8b8d0" font-size="9" font-style="italic"
              text-anchor="end">
            Post-synaptic → response
        </text>
    </g>

    <!-- Specimen frame brackets -->
    <g stroke="rgba(140, 200, 255, 0.5)" stroke-width="1" fill="none">
        <path d="M 12 12 L 12 36 M 12 12 L 36 12"/>
        <path d="M 708 12 L 708 36 M 708 12 L 684 12"/>
        <path d="M 12 468 L 12 444 M 12 468 L 36 468"/>
        <path d="M 708 468 L 708 444 M 708 468 L 684 468"/>
    </g>

</svg>
