<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" role="img" aria-labelledby="regen-title regen-desc">
    <title id="regen-title">Peripheral nerve regeneration across a sutured gap</title>
    <desc id="regen-desc">A textbook-style cross-sectional view of a severed peripheral nerve being repaired. The proximal stump on the left sprouts growth cones that navigate through endoneurial tubes guided by Schwann cells, crossing the suture-bridged gap toward the distal stump on the right.</desc>

    <defs>
        <!-- Epineurium (outer sheath) gradient -->
        <linearGradient id="epi-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#d99088"/>
            <stop offset="50%" stop-color="#c47368"/>
            <stop offset="100%" stop-color="#a55a52"/>
        </linearGradient>

        <!-- Inner tissue / endoneurium -->
        <linearGradient id="tissue-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f0c5b8"/>
            <stop offset="50%" stop-color="#e8a89a"/>
            <stop offset="100%" stop-color="#cc8678"/>
        </linearGradient>

        <!-- Fascicle interior -->
        <radialGradient id="fasc-grad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#f5d6c8"/>
            <stop offset="100%" stop-color="#c08474"/>
        </radialGradient>

        <!-- Schwann cell -->
        <radialGradient id="schwann-grad" cx="50%" cy="40%" r="55%">
            <stop offset="0%" stop-color="#fff5b8"/>
            <stop offset="60%" stop-color="#e8d070"/>
            <stop offset="100%" stop-color="#a89240"/>
        </radialGradient>

        <!-- Axon -->
        <linearGradient id="axon-grad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#5c8db8"/>
            <stop offset="100%" stop-color="#7eb0d8"/>
        </linearGradient>

        <!-- Specimen frame border -->
        <linearGradient id="frame-grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="rgba(140, 200, 255, 0.5)"/>
            <stop offset="100%" stop-color="rgba(80, 130, 180, 0.3)"/>
        </linearGradient>

        <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1.5"/>
        </filter>
    </defs>

    <!-- ============================================================
         BACKGROUND PANEL — dark microscope field with subtle warmth
         ============================================================ -->
    <rect width="760" height="460" fill="#0a1224"/>

    <!-- Subtle radial vignette suggesting microscope objective -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
        <stop offset="0%" stop-color="rgba(40, 30, 35, 0.4)"/>
        <stop offset="100%" stop-color="rgba(8, 12, 25, 0.95)"/>
    </radialGradient>
    <rect width="760" height="460" fill="url(#vignette)"/>

    <!-- ============================================================
         PROXIMAL NERVE STUMP (left)
         ============================================================ -->
    <g id="proximal-stump">
        <!-- Epineurium outer sheath -->
        <path d="M 30 130 Q 50 120 90 122 L 200 130 L 200 290 L 90 298 Q 50 300 30 290 Z"
              fill="url(#epi-grad)" stroke="#7a3f38" stroke-width="1.5"/>

        <!-- Inner tissue (endoneurial mass) -->
        <path d="M 30 145 Q 60 140 95 142 L 195 150 L 195 270 L 95 278 Q 60 280 30 275 Z"
              fill="url(#tissue-grad)" stroke="#a85e50" stroke-width="0.8"/>

        <!-- Fascicles (bundles of axons) -->
        <ellipse cx="80" cy="170" rx="25" ry="11" fill="url(#fasc-grad)"
                 stroke="#9a5a4a" stroke-width="0.6"/>
        <ellipse cx="135" cy="172" rx="22" ry="10" fill="url(#fasc-grad)"
                 stroke="#9a5a4a" stroke-width="0.6"/>
        <ellipse cx="80" cy="210" rx="28" ry="12" fill="url(#fasc-grad)"
                 stroke="#9a5a4a" stroke-width="0.6"/>
        <ellipse cx="140" cy="212" rx="24" ry="10" fill="url(#fasc-grad)"
                 stroke="#9a5a4a" stroke-width="0.6"/>
        <ellipse cx="80" cy="248" rx="25" ry="10" fill="url(#fasc-grad)"
                 stroke="#9a5a4a" stroke-width="0.6"/>
        <ellipse cx="138" cy="250" rx="22" ry="10" fill="url(#fasc-grad)"
                 stroke="#9a5a4a" stroke-width="0.6"/>

        <!-- Cut edge (right side, where nerve was severed) -->
        <line x1="200" y1="130" x2="200" y2="290"
              stroke="#5a2820" stroke-width="2" stroke-dasharray="3,2"/>
    </g>

    <!-- ============================================================
         DISTAL NERVE STUMP (right)
         ============================================================ -->
    <g id="distal-stump">
        <!-- Epineurium -->
        <path d="M 730 130 Q 710 120 670 122 L 560 130 L 560 290 L 670 298 Q 710 300 730 290 Z"
              fill="url(#epi-grad)" stroke="#7a3f38" stroke-width="1.5"/>

        <!-- Inner tissue -->
        <path d="M 730 145 Q 700 140 665 142 L 565 150 L 565 270 L 665 278 Q 700 280 730 275 Z"
              fill="url(#tissue-grad)" stroke="#a85e50" stroke-width="0.8"/>

        <!-- Endoneurial tubes (empty channels left after Wallerian
             degeneration — these are the guidance highways) -->
        <g stroke="#8a4a3a" stroke-width="0.8" fill="none">
            <ellipse cx="680" cy="170" rx="25" ry="11" fill="rgba(180, 120, 100, 0.4)"/>
            <ellipse cx="625" cy="172" rx="22" ry="10" fill="rgba(180, 120, 100, 0.4)"/>
            <ellipse cx="680" cy="210" rx="28" ry="12" fill="rgba(180, 120, 100, 0.4)"/>
            <ellipse cx="620" cy="212" rx="24" ry="10" fill="rgba(180, 120, 100, 0.4)"/>
            <ellipse cx="680" cy="248" rx="25" ry="10" fill="rgba(180, 120, 100, 0.4)"/>
            <ellipse cx="622" cy="250" rx="22" ry="10" fill="rgba(180, 120, 100, 0.4)"/>
        </g>

        <!-- Cut edge -->
        <line x1="560" y1="130" x2="560" y2="290"
              stroke="#5a2820" stroke-width="2" stroke-dasharray="3,2"/>
    </g>

    <!-- ============================================================
         SUTURES bridging the gap
         ============================================================ -->
    <g id="sutures" stroke="#f5e8d8" stroke-width="1.6" fill="none"
       stroke-linecap="round">
        <!-- Suture 1 (top) -->
        <path d="M 195 145 Q 380 130 565 145" stroke-dasharray="5,4"/>
        <!-- Suture 2 -->
        <path d="M 195 195 Q 380 180 565 195" stroke-dasharray="5,4"/>
        <!-- Suture 3 -->
        <path d="M 195 230 Q 380 245 565 230" stroke-dasharray="5,4"/>
        <!-- Suture 4 (bottom) -->
        <path d="M 195 275 Q 380 290 565 275" stroke-dasharray="5,4"/>
    </g>

    <!-- Suture knots / anchor points -->
    <g fill="#fff5e0" filter="url(#soft-glow)">
        <circle cx="195" cy="145" r="2.5"/>
        <circle cx="565" cy="145" r="2.5"/>
        <circle cx="195" cy="195" r="2.5"/>
        <circle cx="565" cy="195" r="2.5"/>
        <circle cx="195" cy="230" r="2.5"/>
        <circle cx="565" cy="230" r="2.5"/>
        <circle cx="195" cy="275" r="2.5"/>
        <circle cx="565" cy="275" r="2.5"/>
    </g>

    <!-- ============================================================
         REGENERATING AXONS — sprouting from proximal stump,
         crossing the gap, navigating into distal endoneurial tubes
         ============================================================ -->
    <g id="regen-axons" fill="none" stroke-linecap="round">
        <!-- Axon sprouts from proximal stump, with branching -->
        <path d="M 200 170 Q 280 160 360 170 Q 440 180 520 170 Q 545 168 565 170"
              stroke="url(#axon-grad)" stroke-width="1.8" opacity="0.9"/>
        <path d="M 200 172 Q 240 168 270 175 Q 285 178 295 172"
              stroke="url(#axon-grad)" stroke-width="1.4" opacity="0.7"/>

        <path d="M 200 210 Q 290 200 380 215 Q 470 225 555 210 Q 562 209 565 210"
              stroke="url(#axon-grad)" stroke-width="1.8" opacity="0.9"/>
        <path d="M 200 212 Q 250 215 290 208"
              stroke="url(#axon-grad)" stroke-width="1.3" opacity="0.65"/>

        <path d="M 200 250 Q 290 260 380 245 Q 470 232 555 250 Q 562 251 565 250"
              stroke="url(#axon-grad)" stroke-width="1.8" opacity="0.9"/>
        <path d="M 200 252 Q 240 248 280 254"
              stroke="url(#axon-grad)" stroke-width="1.3" opacity="0.65"/>
    </g>

    <!-- ============================================================
         GROWTH CONES at the leading tips of regenerating axons
         ============================================================ -->
    <g id="growth-cones">
        <!-- Growth cone 1 -->
        <g transform="translate(540, 170)">
            <path d="M 0 0 L 18 -6 L 22 0 L 18 6 Z" fill="rgba(180, 230, 255, 0.85)"
                  stroke="#5c8db8" stroke-width="0.6"/>
            <circle cx="0" cy="0" r="3.5" fill="#ffffff" filter="url(#soft-glow)"/>
            <!-- Filopodia -->
            <line x1="18" y1="-6" x2="26" y2="-12" stroke="rgba(180, 230, 255, 0.7)" stroke-width="0.8"/>
            <line x1="22" y1="0" x2="32" y2="0" stroke="rgba(180, 230, 255, 0.7)" stroke-width="0.8"/>
            <line x1="18" y1="6" x2="26" y2="12" stroke="rgba(180, 230, 255, 0.7)" stroke-width="0.8"/>
        </g>

        <!-- Growth cone 2 -->
        <g transform="translate(540, 210)">
            <path d="M 0 0 L 18 -6 L 22 0 L 18 6 Z" fill="rgba(180, 230, 255, 0.85)"
                  stroke="#5c8db8" stroke-width="0.6"/>
            <circle cx="0" cy="0" r="3.5" fill="#ffffff" filter="url(#soft-glow)"/>
            <line x1="18" y1="-6" x2="26" y2="-12" stroke="rgba(180, 230, 255, 0.7)" stroke-width="0.8"/>
            <line x1="22" y1="0" x2="32" y2="0" stroke="rgba(180, 230, 255, 0.7)" stroke-width="0.8"/>
            <line x1="18" y1="6" x2="26" y2="12" stroke="rgba(180, 230, 255, 0.7)" stroke-width="0.8"/>
        </g>

        <!-- Growth cone 3 -->
        <g transform="translate(540, 250)">
            <path d="M 0 0 L 18 -6 L 22 0 L 18 6 Z" fill="rgba(180, 230, 255, 0.85)"
                  stroke="#5c8db8" stroke-width="0.6"/>
            <circle cx="0" cy="0" r="3.5" fill="#ffffff" filter="url(#soft-glow)"/>
            <line x1="18" y1="-6" x2="26" y2="-12" stroke="rgba(180, 230, 255, 0.7)" stroke-width="0.8"/>
            <line x1="22" y1="0" x2="32" y2="0" stroke="rgba(180, 230, 255, 0.7)" stroke-width="0.8"/>
            <line x1="18" y1="6" x2="26" y2="12" stroke="rgba(180, 230, 255, 0.7)" stroke-width="0.8"/>
        </g>
    </g>

    <!-- ============================================================
         SCHWANN CELLS migrating along the regeneration path,
         drawn in the textbook style — elongated yellow cells with
         visible nuclei
         ============================================================ -->
    <g id="schwann-cells">
        <g transform="translate(280, 168)">
            <ellipse rx="18" ry="6" fill="url(#schwann-grad)" stroke="#8a7530" stroke-width="0.5"/>
            <ellipse cx="0" cy="0" rx="3" ry="2" fill="#5a4818"/>
        </g>
        <g transform="translate(330, 213)">
            <ellipse rx="18" ry="6" fill="url(#schwann-grad)" stroke="#8a7530" stroke-width="0.5"/>
            <ellipse cx="0" cy="0" rx="3" ry="2" fill="#5a4818"/>
        </g>
        <g transform="translate(420, 168)">
            <ellipse rx="18" ry="6" fill="url(#schwann-grad)" stroke="#8a7530" stroke-width="0.5"/>
            <ellipse cx="0" cy="0" rx="3" ry="2" fill="#5a4818"/>
        </g>
        <g transform="translate(440, 250)">
            <ellipse rx="18" ry="6" fill="url(#schwann-grad)" stroke="#8a7530" stroke-width="0.5"/>
            <ellipse cx="0" cy="0" rx="3" ry="2" fill="#5a4818"/>
        </g>
        <g transform="translate(370, 250)">
            <ellipse rx="18" ry="6" fill="url(#schwann-grad)" stroke="#8a7530" stroke-width="0.5"/>
            <ellipse cx="0" cy="0" rx="3" ry="2" fill="#5a4818"/>
        </g>
    </g>

    <!-- ============================================================
         GROWTH FACTOR DOTS — small green particles representing
         neurotrophic signals released by Schwann cells
         ============================================================ -->
    <g id="growth-factors" fill="rgba(160, 240, 160, 0.7)">
        <circle cx="295" cy="180" r="1.3"/>
        <circle cx="305" cy="160" r="1.0"/>
        <circle cx="315" cy="175" r="1.2"/>
        <circle cx="345" cy="220" r="1.3"/>
        <circle cx="355" cy="205" r="1.0"/>
        <circle cx="435" cy="158" r="1.3"/>
        <circle cx="445" cy="180" r="1.0"/>
        <circle cx="455" cy="248" r="1.3"/>
        <circle cx="385" cy="262" r="1.0"/>
        <circle cx="395" cy="240" r="1.2"/>
    </g>

    <!-- ============================================================
         LEADER LINES AND LABELS — textbook annotation style
         ============================================================ -->
    <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
       font-size="11" font-weight="500">

        <!-- Proximal stump label -->
        <line x1="115" y1="120" x2="115" y2="80" stroke="#b8d4f0" stroke-width="0.8"/>
        <circle cx="115" cy="120" r="2" fill="#b8d4f0"/>
        <text x="115" y="70" text-anchor="middle" fill="#d8e6f5">Proximal stump</text>
        <text x="115" y="84" text-anchor="middle" fill="#98a8c0" font-size="9">
            (still attached to cell body)
        </text>

        <!-- Epineurium label -->
        <line x1="65" y1="135" x2="65" y2="395" stroke="#b8d4f0" stroke-width="0.8"/>
        <circle cx="65" cy="135" r="2" fill="#b8d4f0"/>
        <text x="65" y="408" text-anchor="middle" fill="#d8e6f5">Epineurium</text>
        <text x="65" y="422" text-anchor="middle" fill="#98a8c0" font-size="9">
            (outer connective sheath)
        </text>

        <!-- Fascicles label -->
        <line x1="135" y1="172" x2="155" y2="395" stroke="#b8d4f0" stroke-width="0.8"/>
        <circle cx="135" cy="172" r="2" fill="#b8d4f0"/>
        <text x="155" y="408" text-anchor="middle" fill="#d8e6f5">Fascicles</text>
        <text x="155" y="422" text-anchor="middle" fill="#98a8c0" font-size="9">
            (axon bundles)
        </text>

        <!-- Suture label -->
        <line x1="380" y1="180" x2="380" y2="80" stroke="#b8d4f0" stroke-width="0.8"/>
        <circle cx="380" cy="180" r="2" fill="#b8d4f0"/>
        <text x="380" y="70" text-anchor="middle" fill="#d8e6f5">Suture</text>
        <text x="380" y="84" text-anchor="middle" fill="#98a8c0" font-size="9">
            (mechanical alignment)
        </text>

        <!-- Schwann cell label -->
        <line x1="330" y1="213" x2="330" y2="395" stroke="#b8d4f0" stroke-width="0.8"/>
        <circle cx="330" cy="213" r="2" fill="#b8d4f0"/>
        <text x="330" y="408" text-anchor="middle" fill="#d8e6f5">Schwann cell</text>
        <text x="330" y="422" text-anchor="middle" fill="#98a8c0" font-size="9">
            (releases growth factors)
        </text>

        <!-- Growth cone label -->
        <line x1="540" y1="170" x2="540" y2="80" stroke="#b8d4f0" stroke-width="0.8"/>
        <circle cx="540" cy="170" r="2" fill="#b8d4f0"/>
        <text x="540" y="70" text-anchor="middle" fill="#d8e6f5">Growth cone</text>
        <text x="540" y="84" text-anchor="middle" fill="#98a8c0" font-size="9">
            (regenerating tip ~1 mm/day)
        </text>

        <!-- Endoneurial tube label -->
        <line x1="650" y1="170" x2="650" y2="80" stroke="#b8d4f0" stroke-width="0.8"/>
        <circle cx="650" cy="170" r="2" fill="#b8d4f0"/>
        <text x="650" y="70" text-anchor="middle" fill="#d8e6f5">Endoneurial tube</text>
        <text x="650" y="84" text-anchor="middle" fill="#98a8c0" font-size="9">
            (guidance channel)
        </text>

        <!-- Distal stump label -->
        <line x1="645" y1="300" x2="645" y2="395" stroke="#b8d4f0" stroke-width="0.8"/>
        <circle cx="645" cy="300" r="2" fill="#b8d4f0"/>
        <text x="645" y="408" text-anchor="middle" fill="#d8e6f5">Distal stump</text>
        <text x="645" y="422" text-anchor="middle" fill="#98a8c0" font-size="9">
            (after Wallerian degeneration)
        </text>
    </g>

    <!-- Specimen frame corner brackets -->
    <g stroke="rgba(140, 200, 255, 0.5)" stroke-width="1" fill="none">
        <path d="M 12 12 L 12 36 M 12 12 L 36 12"/>
        <path d="M 748 12 L 748 36 M 748 12 L 724 12"/>
        <path d="M 12 448 L 12 424 M 12 448 L 36 448"/>
        <path d="M 748 448 L 748 424 M 748 448 L 724 448"/>
    </g>

</svg>
